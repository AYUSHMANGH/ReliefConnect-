<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - ReliefConnect</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        .dashboard {
            display: flex;
            height: calc(100vh - 4rem); /* Viewport minus header */
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background-color: var(--gray-800);
            border-right: 1px solid #374151;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid #374151;
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            margin-bottom: 1rem;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--gray-200);
            color: var(--text-muted);
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: var(--trust-blue);
            color: var(--clean-white);
            border-color: var(--trust-blue);
        }

        .center-list {
            flex-grow: 1;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .center-card {
            background-color: var(--darker-bg);
            border-radius: 0.5rem;
            padding: 1rem;
            border: 1px solid #374151;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
        }

        .center-card:hover {
            border-color: var(--trust-blue);
            transform: translateX(4px);
        }

        .center-card h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
            color: var(--clean-white);
        }

        .center-card p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .badge {
            display: inline-block;
            padding: 0.1rem 0.5rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.5rem;
            background-color: var(--trust-blue);
        }
        
        .badge.warning { background-color: var(--emergency-orange); color: var(--darker-bg); }
        .badge.success { background-color: var(--success-green); color: var(--darker-bg); }

        /* Map Area */
        .map-container {
            flex-grow: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Map Skeleton Loader Overlay */
        #map-skeleton {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--text-muted);
        }
        
        .leaflet-popup-content-wrapper {
            background-color: var(--gray-800);
            color: var(--clean-white);
            border-radius: 0.5rem;
        }
        .leaflet-popup-tip { background-color: var(--gray-800); }
        .leaflet-container a.leaflet-popup-close-button { color: var(--text-muted); }
        
        .popup-title { font-weight: 700; margin-bottom: 0.5rem; }
        .popup-link { color: var(--emergency-orange); text-decoration: underline; margin-top: 0.5rem; display: inline-block;}
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Resources</h2>
                <div class="filter-group" id="filters">
                    <button class="filter-btn active" data-filter="All">All</button>
                    <button class="filter-btn" data-filter="Food">Food</button>
                    <button class="filter-btn" data-filter="Medicine">Medicine</button>
                    <button class="filter-btn" data-filter="Oxygen">Oxygen</button>
                </div>
            </div>
            
            <div class="center-list" id="center-list">
                <!-- Skeletons -->
                <div class="skeleton" style="height: 100px; width: 100%;"></div>
                <div class="skeleton" style="height: 100px; width: 100%;"></div>
                <div class="skeleton" style="height: 100px; width: 100%;"></div>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-container">
            <div id="map-skeleton" class="skeleton">
                Initializing Mission Control...
            </div>
            <div id="map"></div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let map, markers = [];
            const centerListEl = document.getElementById('center-list');
            const mapSkeleton = document.getElementById('map-skeleton');
            
            // Simulate Network Delay for realism
            setTimeout(() => {
                initDashboard();
            }, 800);

            function initDashboard() {
                // Remove Map Skeleton
                mapSkeleton.style.display = 'none';

                // Initialize Map (Centered on SF for mock data)
                map = L.map('map').setView([37.7749, -122.4194], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    className: 'map-tiles'
                }).addTo(map);

                // Add dark mode filter via CSS to tiles
                document.querySelector('.leaflet-layer').style.filter = 'invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%)';

                renderData('All');
                setupFilters();
            }

            function setupFilters() {
                const btns = document.querySelectorAll('.filter-btn');
                btns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        btns.forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        renderData(e.target.dataset.filter);
                        window.showToast(`Filtered by ${e.target.dataset.filter}`);
                    });
                });
            }

            function renderData(filterCategory) {
                // Clear existing
                markers.forEach(m => map.removeLayer(m));
                markers = [];
                centerListEl.innerHTML = '';

                let centers = window.getCenters();
                if (filterCategory !== 'All') {
                    centers = centers.filter(c => c.category === filterCategory);
                }

                if(centers.length === 0) {
                    centerListEl.innerHTML = '<p style="color: var(--text-muted);">No centers found for this filter.</p>';
                    return;
                }

                centers.forEach(center => {
                    // Add Sidebar Item
                    const card = document.createElement('div');
                    card.className = 'center-card';
                    card.innerHTML = `
                        <h3>${center.name}</h3>
                        <p>${center.category} | ${center.address || 'Address N/A'}</p>
                        <span class="badge ${center.stock === 'High' ? 'success' : center.stock === 'Low' ? 'warning' : ''}">${center.stock} Stock</span>
                    `;
                    card.addEventListener('click', () => {
                        map.setView([center.lat, center.lng], 15);
                        // find matching marker and open popup
                        const m = markers.find(mark => mark.options.title === center.id);
                        if(m) m.openPopup();
                    });
                    centerListEl.appendChild(card);

                    // Add Map Marker
                    const marker = L.marker([center.lat, center.lng], { title: center.id }).addTo(map);
                    
                    const popupContent = `
                        <div class="popup-title">${center.name}</div>
                        <div>Category: ${center.category}</div>
                        <div>Stock: ${center.stock}</div>
                        <a href="details.html?id=${center.id}" class="popup-link">View Details →</a>
                    `;
                    
                    marker.bindPopup(popupContent);
                    markers.push(marker);
                });
                
                // Adjust map bounds if we have markers
                if(markers.length > 0) {
                    const group = new L.featureGroup(markers);
                    map.fitBounds(group.getBounds().pad(0.1));
                }
            }
        });
    </script>
</body>
</html>
